<!DOCTYPE html>
<html>
<head>
  <title>BattleBit Community Servers</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
  <link rel="stylesheet" href="resources/css/style.css">
</head>
<body>
  <section class="hero is-primary is-bold">
    <div class="hero-body">
      <div class="container">
        <h1 class="title is-1">Server List</h1>
      </div>
    </div>
  </section>

  <div class="container">
    <div id="totalPlayersContainer">
      Total Players: <span id="totalPlayers">0</span>
    </div>

    <div id="sortButtons" class="buttons has-text-centered">
      <button class="button is-primary is-small" onclick="sortServersBy('Gamemode')" id="sortGamemode">Sort by Gamemode</button>
      <button class="button is-primary is-small" onclick="sortServersBy('Players')" id="sortPlayers">Sort by Players</button>
      <button class="button is-primary is-small" onclick="sortServersBy('Map')" id="sortMap">Sort by Map</button>
      <button class="button is-primary is-small" onclick="sortServersBy('Region')" id="sortRegion">Sort by Region</button>
      <button class="button is-primary is-small" onclick="sortServersBy('DayNight')" id="sortDayNight">Sort by Day/Night</button>
    </div>
    
    <div id="filters" class="has-text-centered">
      <button class="button is-primary is-small" onclick="toggleOfficialServers()" id="toggleOfficial">Toggle Official Servers</button>
      <button class="button is-primary is-small" onclick="toggleCommunityServers()" id="toggleCommunity">Toggle Community Servers</button>
      <div class="select is-small">
        <select id="regionFilter" onchange="filterByRegion()">
          <option value="">Filter by Region</option>
          <option value="Europe_Central">Europe Central</option>
          <option value="America_Central">America Central</option>
          <option value="Australia_Central">Australia Central</option>
          <option value="Japan_Central">Japan Central</option>
          <option value="Brazil_Central">Brazil Central</option>
        </select>
      </div>
      <div class="select is-small">
        <select id="sizeFilter" onchange="filterBySize()">
          <option value="">Filter by Size</option>
          <option value="16">16</option>
          <option value="32">32</option>
          <option value="64">64</option>
          <option value="128">128</option>
          <option value="254">254</option>
        </select>
      </div>
    </div>
    
    <div id="noServersNotice" style="display: none;"></div>

    <ul id="serverList" class="columns is-multiline"></ul>
    <noscript>
      <div class="notification is-danger">
        <p>
          This site requires JavaScript to function properly. Please enable JavaScript in your browser settings.
        </p>
      </div>
    </noscript>
  </div>

  <script src="resources/js/api.js"></script>
</body>
</html>
